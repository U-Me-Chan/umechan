server {
  listen 80;
  charset utf-8;

  open_file_cache max=100000 inactive=30m;
  open_file_cache_valid 45m;
  open_file_cache_min_uses 2;
  open_file_cache_errors on;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;

  gzip on;
  gzip_min_length 1100;
  gzip_buffers 4 8k;
  gzip_comp_level 9;
  gzip_types text/plain text/css application/javascript image/png image/jpeg image/gif image/webp video/webm video/mp4 video/quicktime;

  client_max_body_size :max_filesize:;
  large_client_header_buffers 12 25M;

  error_page 404 /files/deleted.jpg;

  location /files {
    root /var/www/html;
    add_header Cache-Control "public, max-age=2592000";
    access_log /var/log/nginx/access-static.log;
  }

  location / {
    index index.html;
    root /var/www/html;
    expires 1d;
    access_log /var/log/nginx/access-static.log;

    try_files $uri $uri/ /index.html;
  }

  include /etc/nginx/locations/*.conf;
}